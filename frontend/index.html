<!DOCTYPE html>
<html>
<head>
    <title>Game</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>
<body style="margin:0; overflow:hidden;">

<div id="ui">
    <div id="joystick"></div>
    <button id="shootBtn">🔥</button>
</div>

<style>
#ui {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

#joystick {
    position: absolute;
    bottom: 30px;
    left: 30px;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    pointer-events: auto;
}

#shootBtn {
    position: absolute;
    bottom: 40px;
    right: 40px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: red;
    color: white;
    font-size: 20px;
    border: none;
    pointer-events: auto;
}
</style>
<script>
const urlParams = new URLSearchParams(window.location.search);

const ROOM_ID = urlParams.get("room");
const PASSWORD = urlParams.get("password") || "";

const TOKEN = localStorage.getItem("token");

if (!TOKEN) {
    window.location.href = "/";
}
</script>

<script src="game.js"></script>
</body>
</html>
